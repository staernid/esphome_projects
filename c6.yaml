esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - script.execute: auto_scroll_pages

esp32:
  variant: esp32c6
  flash_size: 4MB
  framework:
    type: esp-idf

i2c:
  - scl: 7
    sda: 6
    id: i2c_1
    frequency: 800khz # Overclocked for smooth 60 FPS transitions

time:
  - platform: homeassistant
    id: ha_time
    on_time:
      - seconds: 0
        then:
          - lvgl.label.update:
              id: clock_label
              text: !lambda |-
                return id(ha_time).now().strftime("%H:%M");

font:
  - id: small
    file: "gfonts://Roboto"
    size: 10
  - id: medium
    file: "gfonts://Roboto"
    size: 14
  - id: large
    file: "gfonts://Roboto"
    size: 28

# Data ingestion from Home Assistant
sensor:
  - platform: homeassistant
    id: inside_temperature
    entity_id: ${inside_temp_entity}
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: indoor_temp_label
            text: !lambda |-
              return str_sprintf("%.1f°C", x);

  - platform: homeassistant
    id: outside_temperature
    entity_id: ${weather_entity}
    attribute: temperature
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: outdoor_temp_label
            text: !lambda |-
              return str_sprintf("%.1f°C", x);

text_sensor:
  - platform: homeassistant
    id: weather_condition
    entity_id: ${weather_entity}
    internal: true
    on_value:
      then:
        - lambda: |-
            if (!id(debug_mode)) {
              std::string cond = x;
              if (cond == "sunny") id(weather_mode) = 1;
              else if (cond == "clear-night") id(weather_mode) = 2;
              else if (cond == "cloudy") id(weather_mode) = 3;
              else if (cond == "partlycloudy") id(weather_mode) = 4;
              else if (cond == "rainy" || cond == "pouring") id(weather_mode) = 5;
              else if (cond == "snowy" || cond == "snowy-rainy") id(weather_mode) = 6;
              else if (cond == "lightning" || cond == "lightning-rainy") id(weather_mode) = 7;
              else if (cond == "windy" || cond == "fog") id(weather_mode) = 8;
              else id(weather_mode) = 1;
            }

display:
  - platform: ssd1306_i2c
    i2c_id: i2c_1
    model: SH1106_128X64
    id: display_ssd1306_i2c_1
    auto_clear_enabled: false
    update_interval: 16ms

# Native LVGL UI Core Engine
lvgl:
  id: my_lvgl
  displays: display_ssd1306_i2c_1

  update_interval: 16ms

  bg_color: black

  theme:
    dark_mode: true

  style_definitions:
    - id: style_large
      text_font: large
      bg_color: black
    - id: style_medium
      text_font: medium
      bg_color: black
    - id: style_small
      text_font: small
      bg_color: black

  top_layer:
    widgets:
      # Single pure algorithmic overlay canvas
      - canvas:
          id: weather_canvas
          width: 128
          height: 64
          transparent: true

  pages:
    # --- PAGE 1: CLOCK & INDOOR TEMP ---
    - id: page_one
      widgets:
        - label:
            text: "INDOOR"
            styles: style_small
            align: top_left
            x: 6
            y: 16
        - label:
            text: "--.-°C"
            id: indoor_temp_label
            styles: style_medium
            align: top_left
            x: 6
            y: 28
        - label:
            text: "--:--"
            id: clock_label
            styles: style_large
            align: top_right
            x: -6
            y: 28

    # --- PAGE 2: OUTDOOR FORECAST ---
    - id: page_two
      widgets:
        - label:
            text: "OUTSIDE"
            styles: style_small
            align: top_mid
            y: 4
        - label:
            text: "--.-°C"
            id: outdoor_temp_label
            styles: style_large
            align: center
            y: -4

interval:
  # Debug Mode Showcase Cycler (Cycles through weather_mode 1..8 every 5s)
  - interval: 5s
    then:
      - lambda: |-
          if (id(debug_mode)) {
            id(weather_mode) = (id(weather_mode) % 8) + 1;
            ESP_LOGI("weather_debug", "Cycled showcase to weather_mode: %d", id(weather_mode));
          }

  - interval: 33ms
    then:
      # 1. Hardware Particle Physics & Dynamic Algorithmic Engine (160MHz RISC-V Compute)
      - lambda: |-
          id(anim_step)++;
          int step = id(anim_step);
          int mode = id(weather_mode);

          // Update Dual-Layer Parallax Cloud Drift (Foreground & Background)
          if (mode == 3 || mode == 4 || mode == 7) {
            id(cloud_x) += 0.5f;
            if (id(cloud_x) > 130.0f) id(cloud_x) = -30.0f;
            id(cloud2_x) += 0.25f;
            if (id(cloud2_x) > 130.0f) id(cloud2_x) = -45.0f;
          }

          // Update Lightning Strobe & Procedural Flash Mechanics
          if (mode == 7) {
            if (id(lightning_flash) > 0) {
              id(lightning_flash)--;
            } else if ((step % 45) == 0 || (rand() % 60 == 0)) {
              id(lightning_flash) = 3;
              id(lightning_x) = 30.0f + (rand() % 68);
            }
          } else {
            id(lightning_flash) = 0;
          }

          // Update Night Meteor / Shooting Star Simulation
          if (mode == 2) {
            if (!id(meteor_active) && (step % 110 == 0 || rand() % 140 == 0)) {
              id(meteor_active) = true;
              id(meteor_x) = 120.0f;
              id(meteor_y) = 2.0f;
            }
            if (id(meteor_active)) {
              id(meteor_x) -= 5.0f;
              id(meteor_y) += 2.8f;
              if (id(meteor_x) < 0.0f || id(meteor_y) > 60.0f) {
                id(meteor_active) = false;
              }
            }
          }

          // Physics Array Binding for 16 Hardware Particles
          auto update_p = [&](int idx, float vx, float vy, int w, int h, int reset_type) {
            float x = 0, y = 0;
            switch(idx) {
              case 1: x = id(p1_x); y = id(p1_y); break; case 2: x = id(p2_x); y = id(p2_y); break;
              case 3: x = id(p3_x); y = id(p3_y); break; case 4: x = id(p4_x); y = id(p4_y); break;
              case 5: x = id(p5_x); y = id(p5_y); break; case 6: x = id(p6_x); y = id(p6_y); break;
              case 7: x = id(p7_x); y = id(p7_y); break; case 8: x = id(p8_x); y = id(p8_y); break;
              case 9: x = id(p9_x); y = id(p9_y); break; case 10: x = id(p10_x); y = id(p10_y); break;
              case 11: x = id(p11_x); y = id(p11_y); break; case 12: x = id(p12_x); y = id(p12_y); break;
              case 13: x = id(p13_x); y = id(p13_y); break; case 14: x = id(p14_x); y = id(p14_y); break;
              case 15: x = id(p15_x); y = id(p15_y); break; case 16: x = id(p16_x); y = id(p16_y); break;
            }
            x += vx; y += vy;
            if (reset_type == 1 && y > 60) { y = 0; x = (step * 17 + idx * 11) % 120; }
            else if (reset_type == 2 && y > 60) { y = 0; x = (step * 19 + idx * 13) % 120; }
            else if (reset_type == 3 && x > 124) { x = 0; y = 6 + (idx * 4) % 48; }

            switch(idx) {
              case 1: id(p1_x)=x; id(p1_y)=y; id(p1_w)=w; id(p1_h)=h; break;
              case 2: id(p2_x)=x; id(p2_y)=y; id(p2_w)=w; id(p2_h)=h; break;
              case 3: id(p3_x)=x; id(p3_y)=y; id(p3_w)=w; id(p3_h)=h; break;
              case 4: id(p4_x)=x; id(p4_y)=y; id(p4_w)=w; id(p4_h)=h; break;
              case 5: id(p5_x)=x; id(p5_y)=y; id(p5_w)=w; id(p5_h)=h; break;
              case 6: id(p6_x)=x; id(p6_y)=y; id(p6_w)=w; id(p6_h)=h; break;
              case 7: id(p7_x)=x; id(p7_y)=y; id(p7_w)=w; id(p7_h)=h; break;
              case 8: id(p8_x)=x; id(p8_y)=y; id(p8_w)=w; id(p8_h)=h; break;
              case 9: id(p9_x)=x; id(p9_y)=y; id(p9_w)=w; id(p9_h)=h; break;
              case 10: id(p10_x)=x; id(p10_y)=y; id(p10_w)=w; id(p10_h)=h; break;
              case 11: id(p11_x)=x; id(p11_y)=y; id(p11_w)=w; id(p11_h)=h; break;
              case 12: id(p12_x)=x; id(p12_y)=y; id(p12_w)=w; id(p12_h)=h; break;
              case 13: id(p13_x)=x; id(p13_y)=y; id(p13_w)=w; id(p13_h)=h; break;
              case 14: id(p14_x)=x; id(p14_y)=y; id(p14_w)=w; id(p14_h)=h; break;
              case 15: id(p15_x)=x; id(p15_y)=y; id(p15_w)=w; id(p15_h)=h; break;
              case 16: id(p16_x)=x; id(p16_y)=y; id(p16_w)=w; id(p16_h)=h; break;
            }
          };

          if (mode == 5 || mode == 7) { // Torrential Rain & Driving Storm
            float vy_base = (mode == 7) ? 5.8f : 4.6f;
            for (int i = 1; i <= 16; i++) {
              update_p(i, 0.6f, vy_base + (i % 3) * 0.4f, 1, 5, 1);
            }
          } else if (mode == 6) { // Turbulent Snow Flurry
            for (int i = 1; i <= 16; i++) {
              float sway = sinf(step * 0.08f + i * 0.7f) * 0.7f + cosf(step * 0.14f + i * 0.3f) * 0.3f;
              int sz = (i <= 4) ? 3 : ((i <= 10) ? 2 : 1);
              update_p(i, sway, 0.8f + (i % 4) * 0.15f, sz, sz, 2);
            }
          } else if (mode == 8) { // Sweeping Wind Gusts & Swirling Leaves
            for (int i = 1; i <= 16; i++) {
              if (i <= 8) { // Fast Stream Vectors
                update_p(i, 4.8f + (i % 4) * 0.5f, 0.0f, 16 + (i % 3) * 6, 1, 3);
              } else { // Swirling Leaf Particles
                float swirl = sinf(step * 0.2f + i) * 1.8f;
                update_p(i, 3.2f, swirl, 2, 2, 3);
              }
            }
          } else if (mode == 1 || mode == 4) { // Sunny Atmospheric Heat Shimmer Motes
            for (int i = 1; i <= 16; i++) {
              float shimmer_x = sinf(step * 0.1f + i) * 0.5f - 0.2f;
              update_p(i, shimmer_x, -0.4f, 1, 1, 1);
            }
          }

      # 2. Clear canvas
      - lvgl.canvas.fill:
          id: weather_canvas
          color: black
          opa: TRANSP

      # 3. Algorithmic Rendering Engine Showcase
      # --- SUNNY / PARTLY CLOUDY (Mode 1 & 4) ---
      - if:
          condition:
            lambda: 'return id(weather_mode) == 1 || id(weather_mode) == 4;'
          then:
            # Core Sun Circle
            - lvgl.canvas.draw_arc:
                id: weather_canvas
                x: 114
                y: 14
                radius: 5
                start_angle: 0
                end_angle: 360
                color: white
                width: 5
            # Trigonometric Orbiting Ray Flares (4 rotating arc flares)
            - lvgl.canvas.draw_arc:
                id: weather_canvas
                x: 114
                y: 14
                radius: 10
                start_angle: !lambda 'return (id(anim_step) * 5 + 0) % 360;'
                end_angle: !lambda 'return (id(anim_step) * 5 + 35) % 360;'
                color: white
                width: 2
            - lvgl.canvas.draw_arc:
                id: weather_canvas
                x: 114
                y: 14
                radius: 10
                start_angle: !lambda 'return (id(anim_step) * 5 + 90) % 360;'
                end_angle: !lambda 'return (id(anim_step) * 5 + 125) % 360;'
                color: white
                width: 2
            - lvgl.canvas.draw_arc:
                id: weather_canvas
                x: 114
                y: 14
                radius: 10
                start_angle: !lambda 'return (id(anim_step) * 5 + 180) % 360;'
                end_angle: !lambda 'return (id(anim_step) * 5 + 215) % 360;'
                color: white
                width: 2
            - lvgl.canvas.draw_arc:
                id: weather_canvas
                x: 114
                y: 14
                radius: 10
                start_angle: !lambda 'return (id(anim_step) * 5 + 270) % 360;'
                end_angle: !lambda 'return (id(anim_step) * 5 + 305) % 360;'
                color: white
                width: 2

      # --- CLEAR NIGHT (Mode 2) ---
      - if:
          condition:
            lambda: 'return id(weather_mode) == 2;'
          then:
            # Sharp Crescent Moon Arcs
            - lvgl.canvas.draw_arc:
                id: weather_canvas
                x: 114
                y: 14
                radius: 8
                start_angle: 110
                end_angle: 310
                color: white
                width: 2
            # Algorithmic Twinkling Starfield (Individual Conditional Star Points)
            - if:
                condition:
                  lambda: 'return (id(anim_step) % 10 < 7);'
                then:
                  - lvgl.canvas.draw_rectangle:
                      id: weather_canvas
                      x: 88
                      y: 8
                      width: 1
                      height: 1
                      bg_color: white
            - if:
                condition:
                  lambda: 'return ((id(anim_step) + 3) % 12 < 8);'
                then:
                  - lvgl.canvas.draw_rectangle:
                      id: weather_canvas
                      x: 98
                      y: 20
                      width: 1
                      height: 1
                      bg_color: white
            - if:
                condition:
                  lambda: 'return ((id(anim_step) + 7) % 9 < 6);'
                then:
                  - lvgl.canvas.draw_rectangle:
                      id: weather_canvas
                      x: 106
                      y: 32
                      width: 1
                      height: 1
                      bg_color: white
            - if:
                condition:
                  lambda: 'return ((id(anim_step) + 2) % 14 < 10);'
                then:
                  - lvgl.canvas.draw_rectangle:
                      id: weather_canvas
                      x: 72
                      y: 14
                      width: 1
                      height: 1
                      bg_color: white
            - if:
                condition:
                  lambda: 'return ((id(anim_step) + 5) % 11 < 7);'
                then:
                  - lvgl.canvas.draw_rectangle:
                      id: weather_canvas
                      x: 60
                      y: 26
                      width: 1
                      height: 1
                      bg_color: white
            - if:
                condition:
                  lambda: 'return ((id(anim_step) + 8) % 13 < 9);'
                then:
                  - lvgl.canvas.draw_rectangle:
                      id: weather_canvas
                      x: 80
                      y: 38
                      width: 1
                      height: 1
                      bg_color: white
            - if:
                condition:
                  lambda: 'return ((id(anim_step) + 1) % 15 < 11);'
                then:
                  - lvgl.canvas.draw_rectangle:
                      id: weather_canvas
                      x: 45
                      y: 10
                      width: 1
                      height: 1
                      bg_color: white
            - if:
                condition:
                  lambda: 'return ((id(anim_step) + 9) % 8 < 5);'
                then:
                  - lvgl.canvas.draw_rectangle:
                      id: weather_canvas
                      x: 30
                      y: 22
                      width: 1
                      height: 1
                      bg_color: white
            # Shooting Star / Meteor Streak
            - if:
                condition:
                  lambda: 'return id(meteor_active) && id(meteor_x) >= 0.0f && id(meteor_y) >= 0.0f;'
                then:
                  - lvgl.canvas.draw_rectangle:
                      id: weather_canvas
                      x: !lambda 'return (int)id(meteor_x);'
                      y: !lambda 'return (int)id(meteor_y);'
                      width: 4
                      height: 2
                      bg_color: white

      # --- DRIFTING PARALLAX CLOUDS (Mode 3, 4, 7) ---
      - if:
          condition:
            lambda: 'return id(weather_mode) == 3 || id(weather_mode) == 4 || id(weather_mode) == 7;'
          then:
            # Background Slow Cloud (only draw when x >= 0)
            - if:
                condition:
                  lambda: 'return id(cloud2_x) >= 0.0f;'
                then:
                  - lvgl.canvas.draw_rectangle:
                      id: weather_canvas
                      x: !lambda 'return (int)id(cloud2_x);'
                      y: 2
                      width: 20
                      height: 5
                      radius: 2
                      bg_color: white
            # Foreground Main Cumulus Cloud (only draw when x >= 0)
            - if:
                condition:
                  lambda: 'return id(cloud_x) >= 0.0f;'
                then:
                  - lvgl.canvas.draw_rectangle:
                      id: weather_canvas
                      x: !lambda 'return (int)id(cloud_x);'
                      y: 6
                      width: 28
                      height: 8
                      radius: 4
                      bg_color: white
                  - lvgl.canvas.draw_rectangle:
                      id: weather_canvas
                      x: !lambda 'return (int)(id(cloud_x) + 7);'
                      y: 2
                      width: 14
                      height: 10
                      radius: 5
