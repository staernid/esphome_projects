# Board: ESP32-C6 DevKitC-1 (Espressif)
# Definition: definitions/boards/esp32-c6-devkitc-1/manifest.yaml

substitutions:
  name: "c6"
  friendly_name: "c6"

  # Home Assistant Entity IDs
  inside_temp_entity: "sensor.c6_inside_temp"
  weather_entity: "weather.forecast_home"

packages:
  common: !include common.yaml

globals:
  - id: debug_mode
    type: bool
    initial_value: 'true' # Set to true to automatically cycle through all 8 weather animations every 5s
  - id: weather_mode
    type: int
    initial_value: '1' # 1: Sunny, 2: Clear Night, 3: Cloudy, 4: Partly Cloudy, 5: Rainy, 6: Snowy, 7: Lightning, 8: Windy/Fog
  - id: current_page
    type: int
    initial_value: '1' # 1: Page One, 2: Page Two
  - id: anim_step
    type: int
    initial_value: '0'
  - id: cloud_x
    type: float
    initial_value: '-35.0'
  - id: cloud2_x
    type: float
    initial_value: '-75.0'
  - id: lightning_flash
    type: int
    initial_value: '0'
  - id: lightning_x
    type: float
    initial_value: '64.0'
  - id: meteor_active
    type: bool
    initial_value: 'false'
  - id: meteor_x
    type: float
    initial_value: '0.0'
  - id: meteor_y
    type: float
    initial_value: '0.0'

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  includes:
    - include/weather_engine.h
  on_boot:
    priority: -100
    then:
      - script.execute: auto_scroll_pages

esp32:
  variant: esp32c6
  flash_size: 4MB
  framework:
    type: esp-idf

i2c:
  - scl: 7
    sda: 6
    id: i2c_1
    frequency: 800khz # Overclocked for smooth 60 FPS transitions

font:
  - id: small
    file: "gfonts://Roboto"
    size: 10
  - id: medium
    file: "gfonts://Roboto"
    size: 14
  - id: large
    file: "gfonts://Roboto"
    size: 28

# Data ingestion from Home Assistant
sensor:
  - platform: homeassistant
    id: inside_temperature
    entity_id: ${inside_temp_entity}
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: indoor_temp_label
            text: !lambda |-
              return str_sprintf("%.1f°C", x);

  - platform: homeassistant
    id: outside_temperature
    entity_id: ${weather_entity}
    attribute: temperature
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: outdoor_temp_label
            text: !lambda |-
              return str_sprintf("%.1f°C", x);

  - platform: rotary_encoder
    name: "Weather Mode Selector"
    id: weather_mode_encoder
    pin_a:
      number: GPIO18
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO19
      mode:
        input: true
        pullup: true
    on_clockwise:
      - lambda: |-
          id(debug_mode) = false;
          id(weather_mode) = (id(weather_mode) % 8) + 1;
          ESP_LOGI("rotary_encoder", "Manual weather mode set to: %d", id(weather_mode));
    on_anticlockwise:
      - lambda: |-
          id(debug_mode) = false;
          id(weather_mode) = (id(weather_mode) == 1) ? 8 : id(weather_mode) - 1;
          ESP_LOGI("rotary_encoder", "Manual weather mode set to: %d", id(weather_mode));

binary_sensor:
  - platform: gpio
    name: "Display Navigation Button"
    id: display_button
    pin:
      number: GPIO20
      mode:
        input: true
        pullup: true
    on_click:
      - min_length: 50ms
        max_length: 500ms
        then:
          - if:
              condition:
                lambda: 'return id(current_page) == 1;'
              then:
                - lvgl.page.show: page_two
                - lambda: 'id(current_page) = 2;'
              else:
                - lvgl.page.show: page_one
                - lambda: 'id(current_page) = 1;'
          - script.execute: auto_scroll_pages
      - min_length: 1000ms
        max_length: 5000ms
        then:
          - lambda: |-
              id(debug_mode) = !id(debug_mode);
              ESP_LOGI("button", "Toggled debug showcase mode: %s", id(debug_mode) ? "ENABLED" : "DISABLED");

text_sensor:
  - platform: homeassistant
    id: weather_condition
    entity_id: ${weather_entity}
    internal: true
    on_value:
      then:
        - lambda: |-
            if (!id(debug_mode)) {
              std::string cond = x;
              if (cond == "sunny") id(weather_mode) = 1;
              else if (cond == "clear-night") id(weather_mode) = 2;
              else if (cond == "cloudy") id(weather_mode) = 3;
              else if (cond == "partlycloudy") id(weather_mode) = 4;
              else if (cond == "rainy" || cond == "pouring") id(weather_mode) = 5;
              else if (cond == "snowy" || cond == "snowy-rainy") id(weather_mode) = 6;
              else if (cond == "lightning" || cond == "lightning-rainy") id(weather_mode) = 7;
              else if (cond == "windy" || cond == "fog") id(weather_mode) = 8;
              else id(weather_mode) = 1;
            }

display:
  - platform: ssd1306_i2c
    i2c_id: i2c_1
    model: SH1106_128X64
    id: display_ssd1306_i2c_1
    auto_clear_enabled: false
    update_interval: 16ms

# Native LVGL UI Core Engine
lvgl:
  id: my_lvgl
  displays: display_ssd1306_i2c_1

  update_interval: 16ms

  bg_color: black

  theme:
    dark_mode: true

  style_definitions:
    - id: style_large
      text_font: large
      bg_color: black
    - id: style_medium
      text_font: medium
      bg_color: black
    - id: style_small
      text_font: small
      bg_color: black

  top_layer:
    widgets:
      # Single pure algorithmic overlay canvas
      - canvas:
          id: weather_canvas
          width: 128
          height: 64
          transparent: true

  pages:
    # --- PAGE 1: CLOCK & INDOOR TEMP ---
    - id: page_one
      widgets:
        - label:
            text: "INDOOR"
            styles: style_small
            align: top_left
            x: 6
            y: 16
        - label:
            text: "--.-°C"
            id: indoor_temp_label
            styles: style_medium
            align: top_left
            x: 6
            y: 28
        - label:
            text: "--:--"
            id: clock_label
            styles: style_large
            align: top_right
            x: -6
            y: 28

    # --- PAGE 2: OUTDOOR FORECAST ---
    - id: page_two
      widgets:
        - label:
            text: "OUTSIDE"
            styles: style_small
            align: top_mid
            y: 4
        - label:
            text: "--.-°C"
            id: outdoor_temp_label
            styles: style_large
            align: center
            y: -4

interval:
  # Clock update interval
  - interval: 1s
    then:
      - lvgl.label.update:
          id: clock_label
          text: !lambda |-
            return id(ha_time).now().strftime("%H:%M");

  # Debug Mode Showcase Cycler (Cycles through weather_mode 1..8 every 5s)
  - interval: 5s
    then:
      - lambda: |-
          if (id(debug_mode)) {
            id(weather_mode) = (id(weather_mode) % 8) + 1;
            ESP_LOGI("weather_debug", "Cycled showcase to weather_mode: %d", id(weather_mode));
          }

  - interval: 33ms
    then:
      - lambda: |-
          id(anim_step)++;
          weather::global_weather_engine.update(
            id(anim_step), id(weather_mode), id(cloud_x), id(cloud2_x),
            id(lightning_flash), id(lightning_x), id(meteor_active),
            id(meteor_x), id(meteor_y)
          );
          weather::global_weather_engine.render(
            id(weather_canvas), id(anim_step), id(weather_mode),
            id(cloud_x), id(cloud2_x), id(lightning_flash), id(lightning_x),
            id(meteor_active), id(meteor_x), id(meteor_y)
          );

# Automation handling utilizing native page actions
script:
  - id: auto_scroll_pages
    mode: restart
    then:
      - while:
          condition:
            lambda: "return true;"
          then:
            - delay: 6s
            # Fixed: Using verified page transition tracking actions
            - lvgl.page.show: page_two
            - lambda: "id(current_page) = 2;"
            - delay: 6s
            - lvgl.page.show: page_one
            - lambda: "id(current_page) = 1;"
