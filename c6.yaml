# Board: ESP32-C6 DevKitC-1 (Espressif)
# Definition: definitions/boards/esp32-c6-devkitc-1/manifest.yaml

substitutions:
  name: "c6"
  friendly_name: "c6"

  # Home Assistant Entity IDs
  inside_temp_entity: "sensor.c6_inside_temp"
  weather_entity: "weather.forecast_home"

packages:
  common: !include common.yaml

globals:
  - id: debug_mode
    type: bool
    initial_value: 'true' # Set to true to automatically cycle through all 8 weather animations every 5s
  - id: weather_mode
    type: int
    initial_value: '1' # 1: Sunny, 2: Clear Night, 3: Cloudy, 4: Partly Cloudy, 5: Rainy, 6: Snowy, 7: Lightning, 8: Windy/Fog
  - id: anim_step
    type: int
    initial_value: '0'
  - id: cloud_x
    type: float
    initial_value: '-35.0'
