# Board: ESP32-C6 DevKitC-1 (Espressif)
# Definition: definitions/boards/esp32-c3-supermini/manifest.yaml

substitutions:
  name: "c6"
  friendly_name: "c6"

  # Home Assistant Entity IDs
  inside_temp_entity: "sensor.c6_inside_temp"
  weather_entity: "weather.forecast_home"

packages:
  common: !include common.yaml

globals:
  - id: ui_mode
    type: int
    initial_value: '3' # 1: Auto Showcase (Screensaver), 2: Manual Showcase (Interactive Knob), 3: Passive Weather (Unified Live Screen)
  - id: weather_mode
    type: int
    initial_value: '1' # 1: Sunny, 2: Clear Night, 3: Cloudy, 4: Partly Cloudy, 5: Rainy, 6: Snowy, 7: Lightning, 8: Windy/Fog
  - id: anim_step
    type: uint32_t
    initial_value: '0'

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  includes:
    - include/weather_engine.h
  on_boot:
    priority: -100
    then:
      - script.execute: apply_ui_mode

esp32:
  variant: esp32c6
  flash_size: 4MB
  framework:
    type: esp-idf

i2c:
  - scl: 7
    sda: 6
    id: i2c_1
    frequency: 800khz # Overclocked for smooth 60 FPS transitions

font:
  - id: small
    file: "gfonts://Roboto"
    size: 10
  - id: medium
    file: "gfonts://Roboto"
    size: 14
  - id: large
    file: "gfonts://Roboto"
    size: 24

# Data ingestion from Home Assistant
sensor:
  - platform: homeassistant
    id: inside_temperature
    entity_id: ${inside_temp_entity}
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: indoor_temp_label
            text: !lambda |-
              return str_sprintf("%.1f°C", x);

  - platform: homeassistant
    id: outside_temperature
    entity_id: ${weather_entity}
    attribute: temperature
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: outdoor_temp_label
            text: !lambda |-
              return str_sprintf("%.1f°C", x);

  - platform: rotary_encoder
    name: "Weather Mode Selector"
    id: weather_mode_encoder
    pin_a:
      number: GPIO18
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO19
      mode:
        input: true
        pullup: true
    on_clockwise:
      - lambda: |-
          id(ui_mode) = 2; // Switch to Manual Showcase Mode
          id(weather_mode) = (id(weather_mode) % 8) + 1;
          weather::global_weather_engine.trigger_gust(5.5f);
          ESP_LOGI("rotary_encoder", "Manual Showcase mode set to: %d (Gust applied)", id(weather_mode));
      - script.execute: apply_ui_mode
    on_anticlockwise:
      - lambda: |-
          id(ui_mode) = 2; // Switch to Manual Showcase Mode
          id(weather_mode) = (id(weather_mode) == 1) ? 8 : id(weather_mode) - 1;
          weather::global_weather_engine.trigger_gust(-5.5f);
          ESP_LOGI("rotary_encoder", "Manual Showcase mode set to: %d (Gust applied)", id(weather_mode));
      - script.execute: apply_ui_mode

binary_sensor:
  - platform: gpio
    name: "Display Mode Button"
    id: display_button
    pin:
      number: GPIO20
      mode:
        input: true
        pullup: true
      inverted: true
    on_click:
      - min_length: 50ms
        max_length: 800ms
        then:
          - lambda: |-
              id(ui_mode) = (id(ui_mode) % 3) + 1;
              ESP_LOGI("button", "Cycled UI Mode to: %d", id(ui_mode));
          - script.execute: apply_ui_mode

text_sensor:
  - platform: homeassistant
    id: weather_condition
    entity_id: ${weather_entity}
    internal: true
    on_value:
      then:
        - lambda: |-
            if (id(ui_mode) == 3) {
              std::string cond = x;
              if (cond == "sunny") id(weather_mode) = 1;
              else if (cond == "clear-night") id(weather_mode) = 2;
              else if (cond == "cloudy") id(weather_mode) = 3;
              else if (cond == "partlycloudy") id(weather_mode) = 4;
              else if (cond == "rainy" || cond == "pouring") id(weather_mode) = 5;
              else if (cond == "snowy" || cond == "snowy-rainy") id(weather_mode) = 6;
              else if (cond == "lightning" || cond == "lightning-rainy") id(weather_mode) = 7;
              else if (cond == "windy" || cond == "fog") id(weather_mode) = 8;
              else id(weather_mode) = 1;
            }

  - platform: homeassistant
    id: sun_state
    entity_id: "sun.sun"
    internal: true
    on_value:
      then:
        - lambda: |-
            if (id(ui_mode) == 3 && id(weather_condition).state == "sunny" && x == "below_horizon") {
              id(weather_mode) = 2; // Auto-shift clear day to clear night when sun is below horizon
            }

display:
  - platform: ssd1306_i2c
    i2c_id: i2c_1
    model: SH1106_128X64
    id: display_ssd1306_i2c_1
    auto_clear_enabled: false
    update_interval: 16ms

# Native LVGL UI Core Engine
lvgl:
  id: my_lvgl
  displays: display_ssd1306_i2c_1

  update_interval: 16ms

  bg_color: black

  theme:
    dark_mode: true

  style_definitions:
    - id: style_large
      text_font: large
      bg_color: black
    - id: style_medium
      text_font: medium
      bg_color: black
    - id: style_small
      text_font: small
      bg_color: black

  top_layer:
    widgets:
      # Single pure algorithmic overlay canvas
      - canvas:
          id: weather_canvas
          width: 128
          height: 64
          transparent: true

  pages:
    # --- UNIFIED SINGLE DISPLAY SCREEN (Mode 3: Live Weather) ---
    - id: page_main
      widgets:
        - label:
            text: "IN/OUT"
            styles: style_small
            align: top_left
            x: 6
            y: 9
        - label:
            text: "--.-°C"
            id: indoor_temp_label
            styles: style_medium
            align: top_left
            x: 6
            y: 23
        - label:
            text: "--.-°C"
            id: outdoor_temp_label
            styles: style_medium
            align: top_left
            x: 6
            y: 41
        - label:
            text: "--:--"
            id: clock_label
            styles: style_large
            align: top_right
            x: -6
            y: 24

    # --- BLANK SCREENSAVER PAGE (Mode 1 & Mode 2) ---
    - id: page_blank

interval:
  # Clock update interval
  - interval: 1s
    then:
      - lvgl.label.update:
          id: clock_label
          text: !lambda |-
            return id(ha_time).now().strftime("%H:%M");

  # Auto Showcase Cycler (Mode 1: screensaver)
  - interval: 5s
    then:
      - lambda: |-
          if (id(ui_mode) == 1) {
            id(weather_mode) = (id(weather_mode) % 8) + 1;
            ESP_LOGI("weather_showcase", "Auto Showcase cycled to weather_mode: %d", id(weather_mode));
          }

  # Render animation loop (~31.25 FPS)
  - interval: 32ms
    then:
      - lambda: |-
          id(anim_step)++;
          weather::global_weather_engine.update(id(anim_step), id(weather_mode));
          weather::global_weather_engine.render(id(weather_canvas), id(anim_step), id(weather_mode));

# Automation handling utilizing native page actions
script:
  - id: apply_ui_mode
    then:
      - if:
          condition:
            lambda: 'return id(ui_mode) == 1 || id(ui_mode) == 2;'
          then:
            - lvgl.page.show: page_blank
          else:
            - lvgl.page.show: page_main
