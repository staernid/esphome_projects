# Board: ESP32-C6 DevKitC-1 (Espressif) - Lightweight Firmware Target with BLE Tracking
substitutions:
  name: "c6"
  friendly_name: "c6"

  # Home Assistant Entity IDs
  inside_temp_entity: "sensor.c6_inside_temp"
  weather_entity: "weather.forecast_home"

packages:
  common: !include common.yaml
  lvgl_base: !include packages/lvgl_base.yaml
  c6_sensors: !include packages/c6/c6_sensors.yaml
  c6_peripherals: !include packages/c6/c6_peripherals.yaml
  c6_display_lightweight: !include packages/c6/c6_display_lightweight.yaml
  c6_ble: !include packages/c6/c6_ble.yaml

globals:
  - id: last_indoor_temp
    type: float
    initial_value: '0.0'
  - id: last_outdoor_temp
    type: float
    initial_value: '0.0'

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  includes:
    - include

esp32:
  variant: esp32c6
  flash_size: 4MB
  framework:
    type: esp-idf

i2c:
  - scl: 7
    sda: 6
    id: i2c_1
    frequency: 400khz
