# Board: ESP32-C6 DevKitC-1 (Espressif)
# Definition: definitions/boards/esp32-c3-supermini/manifest.yaml

substitutions:
  name: "c6"
  friendly_name: "c6"

  # Home Assistant Entity IDs
  inside_temp_entity: "sensor.c6_inside_temp"
  weather_entity: "weather.forecast_home"

packages:
  common: !include common.yaml
  lvgl_base: !include packages/lvgl_base.yaml

globals:
  - id: ui_mode
    type: int
    initial_value: '3' # 1: Auto Showcase (Screensaver), 2: Manual Showcase (Interactive Knob), 3: Passive Weather (Unified Live Screen)
  - id: weather_mode
    type: int
    initial_value: '1' # 1: Sunny, 2: Clear Night, 3: Cloudy, 4: Partly Cloudy, 5: Rainy, 6: Snowy, 7: Lightning, 8: Windy/Fog
  - id: anim_step
    type: uint32_t
    initial_value: '0'
  - id: display_contrast
    type: float
    initial_value: '0.0'
  - id: last_indoor_temp
    type: float
    initial_value: '0.0'
  - id: last_outdoor_temp
    type: float
    initial_value: '0.0'
  - id: osd_wind_feedback
    type: bool
    initial_value: 'false'

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  includes:
    - include/weather_engine.h
  on_boot:
    priority: -100
    then:
      - script.execute: apply_ui_mode

esp32:
  variant: esp32c6
  flash_size: 4MB
  framework:
    type: esp-idf

i2c:
  - scl: 7
    sda: 6
    id: i2c_1
    frequency: 800khz # Overclocked for smooth 60 FPS transitions

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO8
    num_leds: 1
    chipset: ws2812
    name: "Onboard RGB Light"
    id: onboard_led
    default_transition_length: 0s

# Data ingestion from Home Assistant
sensor:
  - platform: homeassistant
    id: inside_temperature
    entity_id: ${inside_temp_entity}
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: indoor_temp_label
            text: !lambda |-
              return weather::format_temp_with_trend(x, id(last_indoor_temp));

  - platform: homeassistant
    id: outside_temperature
    entity_id: ${weather_entity}
    attribute: temperature
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: outdoor_temp_label
            text: !lambda |-
              return weather::format_temp_with_trend(x, id(last_outdoor_temp));

  - platform: homeassistant
    id: ha_wind_speed
    entity_id: ${weather_entity}
    attribute: wind_speed
    internal: true
    on_value:
      then:
        - lambda: |-
            weather::global_weather_engine.set_ha_wind_speed(x);

  - platform: homeassistant
    id: ha_precipitation_rate
    entity_id: ${weather_entity}
    attribute: precipitation
    internal: true
    on_value:
      then:
        - lambda: |-
            weather::global_weather_engine.set_ha_precipitation_rate(x);

  - platform: rotary_encoder
    name: "Weather Mode Selector"
    id: weather_mode_encoder
    pin_a:
      number: GPIO18
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO19
      mode:
        input: true
        pullup: true
    on_clockwise:
      - lambda: |-
          if (id(ui_mode) != 2) {
            id(ui_mode) = 2; // Switch to Manual Showcase Mode
            id(apply_ui_mode).execute();
          } else {
            id(weather_mode) = (id(weather_mode) % 8) + 1;
            weather::global_weather_engine.reset_manual_wind();
            id(show_osd).execute(weather::get_mode_name(id(weather_mode)));
          }
    on_anticlockwise:
      - lambda: |-
          if (id(ui_mode) != 2) {
            id(ui_mode) = 2; // Switch to Manual Showcase Mode
            id(apply_ui_mode).execute();
          } else {
            id(weather_mode) = (id(weather_mode) == 1) ? 8 : id(weather_mode) - 1;
            weather::global_weather_engine.reset_manual_wind();
            id(show_osd).execute(weather::get_mode_name(id(weather_mode)));
          }

binary_sensor:
  - platform: gpio
    name: "Encoder Knob Button"
    id: encoder_sw_button
    pin:
      number: GPIO20
      mode:
        input: true
        pullup: true
      inverted: true
    on_press:
      then:
        - lambda: |-
            if (id(display_contrast) > 0.7f) {
              id(display_contrast) = 0.5f;
            } else if (id(display_contrast) > 0.2f) {
              id(display_contrast) = 0.0f;
            } else {
              id(display_contrast) = 1.0f;
            }
            id(display_ssd1306_i2c_1).set_contrast(id(display_contrast));
            ESP_LOGI("button", "Cycled display contrast to: %.1f", id(display_contrast));
            id(show_osd).execute(str_sprintf("Contrast: %.0f%%", id(display_contrast) * 100.0f));

  - platform: gpio
    name: "Display Mode Button"
    id: mode_button
    pin:
      number: GPIO21
      mode:
        input: true
        pullup: true
      inverted: true
    on_press:
      then:
        - lambda: |-
            id(ui_mode) = (id(ui_mode) % 3) + 1;
            ESP_LOGI("button", "Cycled UI Mode to: %d", id(ui_mode));
        - script.execute: apply_ui_mode

  - platform: gpio
    name: "Weather Preset Button"
    id: weather_button
    pin:
      number: GPIO22
      mode:
        input: true
        pullup: true
      inverted: true
    on_press:
      then:
        - lambda: |-
            id(weather_mode) = (id(weather_mode) % 8) + 1;
            weather::global_weather_engine.reset_manual_wind();
            ESP_LOGI("button", "Cycled weather effect to: %d (%s)", id(weather_mode), weather::get_mode_name(id(weather_mode)));
            if (id(ui_mode) != 2) {
              id(ui_mode) = 2; // Switch to Manual Showcase Mode
              id(apply_ui_mode).execute();
            } else {
              id(show_osd).execute(weather::get_mode_name(id(weather_mode)));
            }

text_sensor:
  - platform: homeassistant
    id: weather_condition
    entity_id: ${weather_entity}
    internal: true
    on_value:
      then:
        - lambda: |-
            if (id(ui_mode) == 3) {
              id(weather_mode) = weather::get_mode_from_condition(x, id(sun_state).state);
            }

  - platform: homeassistant
    id: sun_state
    entity_id: "sun.sun"
    internal: true
    on_value:
      then:
        - lambda: |-
            if (id(ui_mode) == 3 && id(weather_condition).state == "sunny" && x == "below_horizon") {
              id(weather_mode) = 2; // Auto-shift clear day to clear night when sun is below horizon
            }

display:
  - platform: ssd1306_i2c
    i2c_id: i2c_1
    model: SH1106_128X64
    id: display_ssd1306_i2c_1
    auto_clear_enabled: false
    update_interval: 16ms
    contrast: 0.0

# Native LVGL UI Core Engine
lvgl:
  id: my_lvgl
  displays: display_ssd1306_i2c_1

  update_interval: 16ms

  bg_color: black

  theme:
    dark_mode: true

  top_layer:
    widgets:
      # Single pure algorithmic overlay canvas
      - canvas:
          id: weather_canvas
          width: 128
          height: 64
          transparent: true
      - label:
          id: osd_label
          text: ""
          styles: style_osd
          align: center
          hidden: true

  pages:
    # --- UNIFIED SINGLE DISPLAY SCREEN (Mode 3: Live Weather) ---
    - id: page_main
      widgets:
        - label:
            text: "IN/OUT"
            styles: style_small
            align: top_left
            x: 6
            y: 8
        - label:
            text: "--.-°C"
            id: indoor_temp_label
            styles: style_medium
            align: top_left
            x: 6
            y: 21
        - label:
            text: "--.-°C"
            id: outdoor_temp_label
            styles: style_medium
            align: top_left
            x: 6
            y: 38
        - label:
            text: "--:--"
            id: clock_label
            styles: style_large
            align: top_right
            x: -6
            y: 22

    # --- BLANK SCREENSAVER PAGE (Mode 1 & Mode 2) ---
    - id: page_blank

interval:
  # Clock update interval
  - interval: 1s
    then:
      - lvgl.label.update:
          id: clock_label
          text: !lambda |-
            return id(ha_time).now().strftime("%H:%M");

  # Auto Showcase Cycler (Mode 1: screensaver)
  - interval: 5s
    then:
      - lambda: |-
          if (id(ui_mode) == 1) {
            id(weather_mode) = (id(weather_mode) % 8) + 1;
            ESP_LOGI("weather_showcase", "Auto Showcase cycled to weather_mode: %d", id(weather_mode));
          }

  # Render animation loop (~31.25 FPS)
  - interval: 32ms
    then:
      - lambda: |-
          id(anim_step)++;
          weather::global_weather_engine.update(id(anim_step), id(weather_mode));
          weather::global_weather_engine.render(id(weather_canvas), id(anim_step), id(weather_mode));

          // Multi-mode WS2812 RGB Ambient & Lightning Lighting Engine
          bool is_flashing = weather::global_weather_engine.is_lightning_flashing();
          if (is_flashing) {
            // Electric White-Blue Lightning Strobe Flash
            auto call = id(onboard_led)->turn_on();
            call.set_rgb(1.0f, 1.0f, 1.0f);
            call.set_brightness(0.8f);
            call.set_transition_length(0);
            call.perform();
          } else {
            // Determine Ambient Weather & Telemetry Palette
            float r = 0.0f, g = 0.0f, b = 0.0f;
            float out_temp = id(outside_temperature).has_state() ? id(outside_temperature).state : 20.0f;
            float in_temp = id(inside_temperature).has_state() ? id(inside_temperature).state : 20.0f;

            if (out_temp < 0.0f || in_temp < 0.0f) {
              // Freezing Alert (<0°C): Deep Ice Cyan
              r = 0.0f; g = 0.8f; b = 1.0f;
            } else if (out_temp > 30.0f || in_temp > 30.0f) {
              // Heatwave Warning (>30°C): Vivid Crimson Red
              r = 1.0f; g = 0.0f; b = 0.1f;
            } else {
              // Weather Mode Ambient Palette
              switch (id(weather_mode)) {
                case 1: r = 1.0f; g = 0.4f; b = 0.0f; break; // Sunny: Solar Golden Amber
                case 2: r = 0.3f; g = 0.0f; b = 1.0f; break; // Clear Night: Royal Indigo
                case 3:
                case 4: r = 0.5f; g = 0.7f; b = 1.0f; break; // Cloudy: Cool Slate Blue
                case 5: r = 0.0f; g = 0.5f; b = 1.0f; break; // Rainy: Vivid Ocean Cyan
                case 6: r = 0.8f; g = 0.9f; b = 1.0f; break; // Snowy: Pure Frost White
                case 7: r = 0.5f; g = 0.0f; b = 1.0f; break; // Lightning Storm Idle: Deep Electric Purple
                case 8: r = 0.0f; g = 1.0f; b = 0.8f; break; // Windy/Fog: Vibrant Teal Mist
                default: r = 0.5f; g = 0.5f; b = 0.5f; break;
              }
            }

            // Soft Sine Breathing Pulse (strictly clamped floor at 10% min to 35% max)
            float pulse = 0.225f + 0.125f * sinf(id(anim_step) * 0.06f);

            auto call = id(onboard_led)->turn_on();
            call.set_rgb(r, g, b);
            call.set_brightness(pulse);
            call.set_transition_length(0);
            call.perform();
          }


# Automation handling utilizing native page actions
script:
  - id: show_osd
    mode: restart
    parameters:
      message: string
    then:
      - lvgl.label.update:
          id: osd_label
          text: !lambda 'return message;'
      - lvgl.widget.show: osd_label
      - delay: 1s
      - lvgl.widget.hide: osd_label

  - id: apply_ui_mode
    mode: restart
    then:
      - lambda: |-
          if (id(ui_mode) == 3) {
            id(weather_mode) = weather::get_mode_from_condition(id(weather_condition).state, id(sun_state).state);
          }
      - if:
          condition:
            lambda: 'return id(ui_mode) == 1 || id(ui_mode) == 2;'
          then:
            - lvgl.page.show: page_blank
          else:
            - lvgl.page.show: page_main
      - script.execute:
          id: show_osd
          message: !lambda |-
            if (id(ui_mode) == 1) return "Auto Showcase";
            if (id(ui_mode) == 2) return str_sprintf("Manual: %s", weather::get_mode_name(id(weather_mode)));
            return "Passive Weather";
