substitutions:
  name: "c6-sim"
  friendly_name: "c6 Simulation (Lightweight)"

  inside_temp_entity: "sensor.c6_inside_temp"
  weather_entity: "weather.forecast_home"

logger:

packages:
  lvgl_base: !include packages/lvgl_base.yaml

# Simulated time for host clock display
time:
  - platform: host
    id: ha_time

globals:
  - id: last_indoor_temp
    type: float
    initial_value: '0.0'
  - id: last_outdoor_temp
    type: float
    initial_value: '0.0'

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  includes:
    - include

host:

# Dummy simulated sensors for testing UI without Home Assistant server
sensor:
  - platform: template
    id: inside_temperature
    name: "Simulated Inside Temp"
    lambda: 'return 21.5f;'
  - platform: template
    id: outside_temperature
    name: "Simulated Outside Temp"
    lambda: 'return 18.2f;'

text_sensor:
  - platform: template
    id: weather_condition
    name: "Simulated Weather Condition"
    lambda: 'return std::string("sunny");'
  - platform: template
    id: sun_state
    name: "Simulated Sun State"
    lambda: 'return std::string("above_horizon");'

display:
  - platform: sdl
    id: display_sdl
    dimensions:
      width: 128
      height: 64
    window_options:
      resizable: true
      borderless: false
      always_on_top: false
      fullscreen: false
      skip_taskbar: false
    auto_clear_enabled: false
    update_interval: 1s
    sdl_options: "-I/usr/include/SDL2 -D_GNU_SOURCE=1 -D_REENTRANT -lSDL2"

lvgl:
  id: my_lvgl
  displays: display_sdl
  update_interval: 500ms
  bg_color: black
  theme:
    dark_mode: true

  pages:
    - id: page_main
      widgets:
        - label:
            text: "IN/OUT"
            styles: style_small
            align: top_left
            x: 6
            y: 8
        - label:
            text: "21.5°C"
            id: indoor_temp_label
            styles: style_medium
            align: top_left
            x: 6
            y: 21
        - label:
            text: "18.2°C"
            id: outdoor_temp_label
            styles: style_medium
            align: top_left
            x: 6
            y: 38
        - label:
            text: "12:00"
            id: clock_label
            styles: style_large
            align: top_right
            x: -6
            y: 22

interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: clock_label
          text: !lambda |-
            return id(ha_time).now().strftime("%H:%M");
