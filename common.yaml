wifi:
  # https://esphome.io/components/wifi
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  #use_address: ${device_name}.fritzbox # I use this to add a custom domain instead of using the default .local

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_ap_password

captive_portal:

# Enable logging
logger:
  # https://esphome.io/components/logger

# Enable Home Assistant API
api:
  # https://esphome.io/components/api
  encryption:
    key: !secret encryption_key

ota:
  platform: esphome
  password: !secret ota_password

# Enable Web server.
#web_server:
#  port: 80
#  auth:
#    username: !secret web_username
#    password: !secret web_password

# Get the time from Home Assistant to sync the onboard real-time-clock.
time:
  - platform: homeassistant
    id: ha_time

# Enable BLE stack and iBeacon broadcasting for Home Assistant room-presence detection
esp32_ble:
  id: ble_stack

esp32_ble_beacon:
  type: IBEACON
  uuid: "e2c56db5-dffb-48d2-b060-d0f5a71096e0"
  major: 100
  minor: 1
